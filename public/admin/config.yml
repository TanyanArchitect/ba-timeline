# Cấu hình Backend
# Khi chạy ở máy (localhost), nó sẽ lưu thẳng vào ổ cứng của bạn
backend:
  name: git-gateway
  branch: main

# Chế độ làm việc cục bộ (quan trọng để test ngay bây giờ)
local_backend: true

# Nơi lưu ảnh khi bạn upload từ CMS
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

# Cấu hình danh sách dữ liệu (Collections)
collections:
  - name: "stories" # Tên collection trong code
    label: "Timeline Stories" # Tên hiển thị trên menu
    folder: "src/content/stories" # Folder chứa các file data json
    create: true # Cho phép tạo mới
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}" # Định dạng tên file
    extension: "json" # Lưu dưới dạng file JSON
    format: "json"
    
    # CÁC TRƯỜNG NHẬP LIỆU (FIELDS)
    fields:
      - {label: "ID (Unique)", name: "id", widget: "string", hint: "VD: vol1-chap1. Không dấu, không cách"}
      
      - label: "Loại Story (Type)"
        name: "type"
        widget: "select"
        options: 
          - {label: "Main Story", value: "main"}
          - {label: "Mini Story", value: "mini"}
          - {label: "Group Story", value: "group"}
          - {label: "Relationship Story", value: "relationship"}
          - {label: "Task Story", value: "task"}
          - {label: "Event Story", value: "event"}
      
      - label: "Tiêu đề hiển thị (Display Title)"
        name: "display_title"
        widget: "string"
        hint: "Tên Chapter, Tên Event, hoặc Tên Học sinh"
        
      - label: "Tiêu đề phụ (Subtitle)"
        name: "sub_title"
        widget: "string"
        required: false
        hint: "Tên Volume (đối với Main Story) hoặc Tên Nhóm"
        
      - label: "Số thứ tự (Order)"
        name: "order"
        widget: "number"
        value_type: "int"
        hint: "Số càng nhỏ càng nằm ở đầu con rắn timeline"

      - label: "Ảnh bìa"
        name: "image"
        widget: "image"
        required: false

      - label: "Danh sách Episodes"
        name: "episodes"
        widget: "list"
        fields:
          - {label: "Tên Episode", name: "title", widget: "string"}
          - {label: "Nội dung/Link Video", name: "content", widget: "text", required: false}